  security:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Check vulnerable packages
        run: |
          set -e
          dotnet list Ocelot.ApiGateways.csproj package --vulnerable | tee vulnerable.txt || true
          if grep -i "critical" vulnerable.txt; then
            echo "Critical vulnerabilities found" >&2
            exit 1
          else
            echo "No critical vulnerabilities found"
          fi

  package:
    name: Package
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish -c Release -o published --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: published
          path: published
